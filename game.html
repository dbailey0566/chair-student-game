<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Chair–Student Game</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="container">
  <h1>Chair–Student Alignment Session</h1>

  <input 
    type="text" 
    id="sessionTitle" 
    placeholder="Enter Session Title" 
    style="width:100%; padding:10px; margin-bottom:20px;"
  >

  <p id="timer">Session Time: 0 min</p>

  <label for="suiteSelect"><strong>Choose Suite:</strong></label>
  <select id="suiteSelect" style="margin-bottom:15px;">
    <option value="expectations">Expectations</option>
    <option value="career">Career</option>
    <option value="social">Social</option>
    <option value="policy">Policy</option>
  </select>

  <br>

  <button class="btn" onclick="drawQuestion()">Draw Question</button>

  <div id="questionArea" style="margin-top:30px;">
    <h3 id="questionText"></h3>
  </div>

  <div id="responseArea" style="display:none; margin-top:20px;">
    <textarea id="chairResponse" placeholder="Chair Response"></textarea>
    <textarea id="studentResponse" placeholder="Student Response"></textarea>

    <button class="btn" onclick="saveResponse()">Save & Next</button>
    <button class="btn secondary" onclick="endSession()">End Session</button>
  </div>

  <div style="margin-top:40px;">
    <a href="index.html" class="btn secondary">Back</a>
  </div>
</div>

<script src="js/questions.js"></script>
<script src="js/game.js"></script>

</body>
</html>
